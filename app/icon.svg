<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2a4a"/>
      <stop offset="100%" stop-color="#081828"/>
    </linearGradient>
    <linearGradient id="fillTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7de8f8" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#22b8d8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a6898" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="fillBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a6898" stop-opacity="0.2"/>
      <stop offset="40%"  stop-color="#22b8d8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7de8f8" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#88e8f8"/>
      <stop offset="50%"  stop-color="#22c8e8"/>
      <stop offset="100%" stop-color="#0898c8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="34" fill="url(#bg)"/>

  <!-- TOP HALF of hourglass -->
  <!-- Top ellipse rim: cx=100 cy=42 rx=62 ry=12 -->
  <!-- Taper to waist: cx=100 cy=102 rx=10 -->

  <!-- Top fill -->
  <path d="M 38 42 L 90 102 L 110 102 L 162 42 Z" fill="url(#fillTop)"/>
  <ellipse cx="100" cy="42"  rx="62" ry="12" fill="url(#fillTop)"/>

  <!-- BOTTOM HALF of hourglass (mirror) -->
  <!-- Waist: cy=102, Base ellipse: cy=160 rx=62 ry=12 -->

  <path d="M 90 102 L 38 162 L 162 162 L 110 102 Z" fill="url(#fillBot)"/>
  <ellipse cx="100" cy="162" rx="62" ry="12" fill="url(#fillBot)"/>

  <!-- Outline strokes with glow -->
  <!-- Top rim -->
  <ellipse cx="100" cy="42"  rx="62" ry="12"
    fill="none" stroke="url(#stroke)" stroke-width="2.2" filter="url(#glow)"/>
  <!-- Bottom rim -->
  <ellipse cx="100" cy="162" rx="62" ry="12"
    fill="none" stroke="url(#stroke)" stroke-width="2.2" filter="url(#glow)"/>
  <!-- Left edge top-half -->
  <line x1="38" y1="42" x2="90" y2="102"
    stroke="url(#stroke)" stroke-width="2.2" filter="url(#glow)"/>
  <!-- Right edge top-half -->
  <line x1="162" y1="42" x2="110" y2="102"
    stroke="url(#stroke)" stroke-width="2.2" filter="url(#glow)"/>
  <!-- Left edge bottom-half -->
  <line x1="90" y1="102" x2="38" y2="162"
    stroke="url(#stroke)" stroke-width="2.2" filter="url(#glow)"/>
  <!-- Right edge bottom-half -->
  <line x1="110" y1="102" x2="162" y2="162"
    stroke="url(#stroke)" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Waist ellipse -->
  <ellipse cx="100" cy="102" rx="10" ry="4"
    fill="none" stroke="url(#stroke)" stroke-width="1.6" filter="url(#glow)"/>

  <!-- 3 dots at waist -->
  <circle cx="86"  cy="102" r="2.8" fill="#44d8f0" filter="url(#glow)"/>
  <circle cx="100" cy="102" r="2.8" fill="#44d8f0" filter="url(#glow)"/>
  <circle cx="114" cy="102" r="2.8" fill="#44d8f0" filter="url(#glow)"/>
</svg>
