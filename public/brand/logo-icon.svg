<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background radial -->
    <radialGradient id="bgR" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="100%" stop-color="#091828"/>
    </radialGradient>

    <!-- Hourglass body: bright teal-left to deep-blue-right -->
    <linearGradient id="bodyG" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#88dff5"/>
      <stop offset="30%"  stop-color="#3aaad4"/>
      <stop offset="70%"  stop-color="#1e72a8"/>
      <stop offset="100%" stop-color="#0e4878"/>
    </linearGradient>

    <!-- Left-edge highlight (lighter strip on bowl left side) -->
    <linearGradient id="hlG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b0eeff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#b0eeff" stop-opacity="0"/>
    </linearGradient>

    <!-- Base left-edge highlight -->
    <linearGradient id="hlB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#90d8f0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#90d8f0" stop-opacity="0"/>
    </linearGradient>

    <!-- Arrow: white core to light-cyan -->
    <linearGradient id="arrG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8eeff"/>
    </linearGradient>

    <!-- Subtle glow behind full icon -->
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow glow -->
    <filter id="arrGlow" x="-50%" y="-30%" width="200%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="200" height="200" rx="38" fill="url(#bgR)"/>

  <!-- Soft inner glow circle behind hourglass -->
  <radialGradient id="igR" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#3ab8d8" stop-opacity="0.22"/>
    <stop offset="100%" stop-opacity="0"/>
  </radialGradient>
  <rect width="200" height="200" rx="38" fill="url(#igR)"/>

  <!-- ── HOURGLASS ── -->

  <!-- TOP BOWL fill (wide at top, tapers to waist) -->
  <path d="M 28 44
    C 46 82 68 112 80 122
    L 120 122
    C 132 112 154 82 172 44
    Z"
    fill="url(#bodyG)"/>

  <!-- Top ellipse (opening of bowl) -->
  <ellipse cx="100" cy="44" rx="72" ry="15" fill="url(#bodyG)"/>

  <!-- Left-side highlight on bowl -->
  <path d="M 28 44
    C 46 82 68 112 80 122
    L 72 120
    C 56 106 36 78 20 44
    Z"
    fill="url(#hlG)"/>

  <!-- Inner bowl shadow (dark area inside the funnel for 3D depth) -->
  <path d="M 36 50
    C 54 86 72 114 84 122
    L 116 122
    C 128 114 146 86 164 50
    Q 132 60 100 62
    Q 68 60 36 50 Z"
    fill="#0a3060" opacity="0.45"/>

  <!-- WAIST separator -->
  <ellipse cx="100" cy="122" rx="20" ry="5.5" fill="#0a3060" opacity="0.7"/>

  <!-- BASE PEDESTAL fill (flares from waist to bottom) -->
  <path d="M 80 122
    L 58 166
    L 142 166
    L 120 122
    Z"
    fill="url(#bodyG)"/>

  <!-- Base bottom ellipse -->
  <ellipse cx="100" cy="166" rx="42" ry="11" fill="url(#bodyG)"/>

  <!-- Base left-edge highlight -->
  <path d="M 80 122 L 58 166 L 68 166 L 88 122 Z"
    fill="url(#hlB)"/>

  <!-- Base inner shadow (darker centre) -->
  <path d="M 82 124 L 62 164 L 138 164 L 118 124
    Q 100 130 82 124 Z"
    fill="#0a3060" opacity="0.30"/>

  <!-- ── ARROW ── -->

  <!-- Arrow head -->
  <polygon points="100,11  73,48  127,48"
    fill="url(#arrG)" filter="url(#arrGlow)"/>

  <!-- Arrow shaft -->
  <rect x="93" y="48" width="14" height="66" rx="2"
    fill="url(#arrG)" filter="url(#arrGlow)"/>

</svg>
